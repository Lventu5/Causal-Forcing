trainer: diffusion
training_stage: action_node_ca_warmup
dataset_type: ui_sim_latent
data_path: ${oc.env:UI_SIM_CF_LATENT_CACHE,dataset/ui_sim_latents/training}
generator_ckpt: ${oc.env:CF_UI_STAGE1_ACTION_CKPT,checkpoints/ui_sim/action_stage1/model.pt}
allow_partial_generator_load: true
generator_fsdp_wrap_strategy: size
real_score_fsdp_wrap_strategy: size
fake_score_fsdp_wrap_strategy: size
text_encoder_fsdp_wrap_strategy: size
seed: 0
sharding_strategy: hybrid_full
beta1: 0.0
beta2: 0.999
beta1_critic: 0.0
beta2_critic: 0.999
total_batch_size: 8

i2v: true
independent_first_frame: false
num_frame_per_block: 1
num_training_frames: 21
image_or_video_shape: [1, 21, 16, 60, 104]
height: 480
width: 832
num_frames: 21
vae_decode_mode: single_frame

ui_prompt: desktop file manager UI transition
ui_prompt_mode: graph_paths
ui_source_width: 1024
ui_source_height: 768
ui_action_coordinate_mode: legacy_normalized_source
ui_random_clip: true
ui_graph_tokens_per_frame: 32
ui_graph_token_dim: 1024
ui_graph_token_has_mask: true

element_loss:
  enabled: false
  cache_dir: ${oc.env:UI_SIM_ELEMENT_CACHE,element_cache}
  base_weight: 1.0
  element_boost: 20.0
  text_cache_dir: ""
  text_boost: 50.0
  text_min_confidence: 0.5
  text_padding_px: 2

model_kwargs:
  model_name: Wan2.1-T2V-1.3B
  model_root: ${oc.env:WAN_MODEL_DIR,wan_models}
  timestep_shift: 5.0
  local_attn_size: 21
  sink_size: 0
  ui_conditioning:
    enabled: true
    action_dim: 3
    action_token_dim: 1024
    node_token_dim: 1024
    latent_channels: 16
    hidden_dim: 256
    block_cross_attn: true
    action_block_cross_attn: true
    require_graph_token_positions: true
    condition_position_encoding: ${oc.env:UI_CONDITION_POSITION_ENCODING,learned_projection}
    action_condition_position_encoding: ${oc.env:UI_ACTION_CONDITION_POSITION_ENCODING,rope_2d}
    freeze_backbone: true
    condition_cross_attn_only: true
    train_action_condition_cross_attn: false
    action_attention_dropout: 0.0
    action_embedding_recipe: ${oc.env:UI_ACTION_EMBEDDING_RECIPE,dfot_exact}
    action_coord_encoding: ${oc.env:UI_ACTION_COORD_ENCODING,dfot_s3_fourier}
    action_coord_space: wan_patch_grid
    action_patch_grid_height: 30
    action_patch_grid_width: 52
    action_coord_emb_dim: 64
    target_width: 832
    target_height: 480
    action_dropout: 0.0
    node_dropout: 0.10
    node_attention_dropout: 0.0

teacher_forcing: true
load_raw_video: false
gradient_checkpointing: true
mixed_precision: true
num_train_timestep: 1000
timestep_shift: 5.0
guidance_scale: 3.0
lr: 1.0e-4
weight_decay: 0.01
batch_size: 1
num_workers: 8
pin_memory: true
persistent_workers: true
prefetch_factor: 2
cache_text_embeddings: false
gc_interval: 0
ema_weight: 0.99
ema_start_step: 2000000000
log_iters: 10
save_iters: 1000
visualize_interval: 1000
eval_interval: 5000
eval_num_output_frames: 9
visualize_sample_index: 0
visualize_seed: 0
visualize_timestep: 500
visualize_fps: 4
negative_prompt: low quality, blurry, distorted UI text, wrong action outcome
